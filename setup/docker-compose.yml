version: '3.8'

services:
  postgres:
    image: postgres:18-alpine
    container_name: pp-gordeev-voice-ka-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
      PGUSER: postgres
      PGPASSWORD: postgres
      POSTGRES_INITDB_ARGS: "--locale-provider=libc --locale=C"
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
      LC_MESSAGES: C.UTF-8
      LC_CTYPE: C.UTF-8
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./docker/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ../src-server/migrations/001_initial_schema.sql:/docker-entrypoint-initdb.d/02-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - voice-ka-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
    name: voice-ka-postgres-data

networks:
  voice-ka-network:
    name: voice-ka-network
    driver: bridge